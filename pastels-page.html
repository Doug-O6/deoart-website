<!DOCTYPE html>
<html>
  <head>
    <title>Pastels Page</title>
    <style>

      .thumbnail-grid {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr 1fr 1fr;
        column-gap: 20px;
        row-gap: 20px;
      }

      .thumbnail-contaner {
        width: 100%;
        margin-bottom: 20px;
      }

      .thumbnail-picture {
        width: 100%;
        height: 300px;
        object-fit: cover;
      }

      .thumbnail-text-contaner {
        text-align: center;
        margin-top: 2px;
      }

      .thumbnail-title {
        margin-top: 6px;
        margin-bottom: 6px;
       font-size: 20px;
       font-weight: bold;
      }

      .thumbnail-dimensions {
        margin-top: 2px;
        margin-bottom: 2px;
      }

      .thumbnail-media {
        margin-top: 2px;
        margin-bottom: 2px;
      }

    </style>

  </head>
  <body>

    <div class="thumbnail-grid">
      <div class="thumbnail-contaner">
        <div>
          <img class="thumbnail-picture" src="pastels/Day's End.JPG">
        </div>
        <div class="thumbnail-text-contaner">
          <p class="thumbnail-title">Day's End</p>
          <p class="thumbnail-dimensions">36" x 48"</p>
          <p class="thumbnail-media">Pastel on Paper</p>
        </div>
      </div>
  
      <div class="thumbnail-contaner">
        <div>
          <img class="thumbnail-picture" src="pastels/1,2,3....JPG">

      </div>

      </div>
