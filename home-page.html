<!DOCTYPE html>
<html>
  <head>
    <title>Home Page</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400..900&family=Roboto:wght@300;400&display=swap"
      rel="stylesheet"
    />

    <style>
      .flex-container {
        display: flex;
        flex-direction: row;
        background-color: lightgray;
        height: 100px;
      }

      .deoart-box {
        flex: 20;
        font-family: Cinzel, serif;
        font-size: 30px;
        background-color: aquamarine;
        margin: 10px;
        padding: 20px;
      }

      
      .buttons {
        flex: 1;
        font-size: 16px;
        vertical-align: middle;
        font-family: Roboto, sans-serif;
        background-color: aquamarine;
        margin: 10px;
        padding: 20px;
      }
    </style>
  </head>
  <body>
    <div class="flex-container">
      <div class="deoart-box">DEoArT</div>
      <div class="buttons">Home</div>
      <div class="buttons">Paintings</div>
      <div class="buttons">Pastels</div>
      <div class="buttons">About</div>
      <div class="buttons">Contact</div>
      <div class="buttons">Collect</div>
    </div>
  </body>
</html>
